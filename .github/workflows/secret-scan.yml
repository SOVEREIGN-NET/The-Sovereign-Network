name: Secret & Artifact Scan

on:
  pull_request:
    branches: [development, main]
  push:
    branches: [development, main]

jobs:
  scan:
    name: Block sensitive/local artifacts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for blocked file patterns
        shell: bash
        run: |
          ERRORS=()
          BLOCKED_PATTERNS=('\.b64$' '\.key$' '\.pem$' '^\.env$' '^\.env\.')
          BLOCKED_GLOBS=('keystore*')
          BLOCKED_PATHS=('^tmp/' '^\.zhtp/')

          while IFS= read -r f; do
            base="$(basename "$f")"
            for pat in "${BLOCKED_PATTERNS[@]}"; do
              if echo "$base" | grep -qE "$pat"; then
                ERRORS+=("blocked extension: $f")
              fi
            done
            for glob in "${BLOCKED_GLOBS[@]}"; do
              # Skip source code files — keystore_names.rs etc. are code, not secrets
              if [[ "$f" == *.rs || "$f" == *.ts || "$f" == *.js || "$f" == *.go ]]; then
                continue
              fi
              if [[ "$base" == $glob ]]; then
                ERRORS+=("blocked name: $f")
              fi
            done
            for prefix in "${BLOCKED_PATHS[@]}"; do
              if echo "$f" | grep -qE "$prefix"; then
                ERRORS+=("blocked path: $f")
              fi
            done
          done < <(git ls-files)

          if [[ ${#ERRORS[@]} -gt 0 ]]; then
            echo "::error::Sensitive or local-only files are tracked in git (issue #1934):"
            for err in "${ERRORS[@]}"; do echo "  x $err"; done
            exit 1
          fi
          echo "No blocked file patterns found in tracked files."

      - name: Check for symlinks
        shell: bash
        run: |
          SYMLINKS=""
          while IFS= read -r f; do
            if [ -L "$f" ]; then SYMLINKS="$SYMLINKS $f"; fi
          done < <(git ls-files)
          if [[ -n "$SYMLINKS" ]]; then
            echo "::error::Symlinks found in tracked files: $SYMLINKS"
            exit 1
          fi
          echo "No symlinks in tracked files."
